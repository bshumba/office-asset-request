services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: office-asset-request-app
    environment:
      APP_NAME: "Office Asset Request"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://localhost:${APP_PORT:-8001}"
      DB_CONNECTION: mysql
      DB_HOST: "${DOCKER_DB_HOST:-host.docker.internal}"
      DB_PORT: "${DOCKER_DB_PORT:-3306}"
      DB_DATABASE: "${DOCKER_DB_DATABASE:-office_asset_request}"
      DB_USERNAME: "${DOCKER_DB_USERNAME:-root}"
      DB_PASSWORD: "${DOCKER_DB_PASSWORD:-}"
      APP_RUN_SEED: "${APP_RUN_SEED:-false}"
    ports:
      - "${APP_PORT:-8001}:8001"
    volumes:
      - app_storage:/var/www/html/storage
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8001/up"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  app_storage:
